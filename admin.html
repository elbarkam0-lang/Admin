<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة الشاملة | مطعم البركة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Poppins:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #e74c3c;
            --secondary: #c0392b;
            --dark: #2c3e50;
            --bg: #f4f7f6;
            --white: #ffffff;
            --success: #27ae60;
            --warning: #f39c12;
            --gray: #7f8c8d;
            --border: #e0e6ed;
            --shadow: 0 8px 20px rgba(0,0,0,0.05);
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--dark); padding-bottom: 50px; }
        .en-text { font-family: 'Poppins', sans-serif; }

        /* ================= Header ================= */
        header {
            background: var(--dark); color: var(--white); padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 22px; font-weight: 800; display: flex; align-items: center; gap: 10px; }
        .logo i { color: var(--primary); }
        
        /* ================= Layout ================= */
        .dashboard-container { max-width: 1400px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; align-items: start; }
        .full-width { grid-column: 1 / -1; }
        @media (max-width: 900px) { .dashboard-container { grid-template-columns: 1fr; } }

        .card { background: var(--white); padding: 25px; border-radius: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--bg); padding-bottom: 15px; }
        .card-header h2 { font-size: 20px; font-weight: 700; color: var(--dark); }
        .card-header i { background: rgba(231, 76, 60, 0.1); color: var(--primary); padding: 10px; border-radius: 10px; font-size: 18px; }

        /* ================= Forms ================= */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: var(--gray); }
        .form-control {
            width: 100%; padding: 12px 15px; border: 1px solid var(--border); border-radius: 10px;
            font-family: 'Cairo', sans-serif; font-size: 15px; transition: var(--transition); background: var(--bg); outline: none;
        }
        .form-control:focus { border-color: var(--primary); background: var(--white); box-shadow: 0 0 0 3px rgba(231,76,60,0.1); }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

        .offer-box { background: rgba(243, 156, 18, 0.05); border: 1px dashed var(--warning); padding: 15px; border-radius: 10px; margin-top: 15px; transition: var(--transition); }
        .checkbox-label { display: flex; align-items: center; gap: 10px; font-weight: 600; cursor: pointer; color: var(--warning); }
        .checkbox-label input { width: 18px; height: 18px; cursor: pointer; accent-color: var(--warning); }

        .btn { padding: 14px 20px; border: none; border-radius: 10px; font-weight: 700; font-family: 'Cairo', sans-serif; font-size: 16px; cursor: pointer; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
        .btn-save { background: var(--success); color: white; margin-top: 20px; }
        .btn-save:hover { background: #219653; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3); }
        .btn-save:disabled { background: var(--gray); cursor: not-allowed; transform: none; box-shadow: none; }

        /* ================= Orders View ================= */
        .orders-container { max-height: 600px; overflow-y: auto; padding-right: 5px; }
        .orders-container::-webkit-scrollbar { width: 6px; }
        .orders-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .order-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 15px; padding: 20px; transition: var(--transition); position: relative; overflow: hidden; }
        .order-card::before { content: ''; position: absolute; top: 0; right: 0; width: 5px; height: 100%; background: var(--primary); }
        .order-card:hover { box-shadow: var(--shadow); transform: translateX(-5px); }
        
        .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .customer-info h3 { font-size: 18px; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
        .customer-info p { color: var(--gray); font-size: 14px; display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        
        .order-time { font-size: 12px; color: var(--gray); background: var(--bg); padding: 4px 10px; border-radius: 20px; }
        
        .order-items { background: var(--bg); padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px dashed #cbd5e1; }
        .order-items ul { list-style: none; }
        .order-items li { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 14px; font-weight: 600; }
        .order-items li:last-child { border-bottom: none; padding-bottom: 0; }
        
        .order-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); }
        .order-total { font-size: 18px; font-weight: 800; color: var(--dark); }
        .order-total span { color: var(--primary); }
        
        .btn-deliver { background: var(--primary); color: white; padding: 10px 20px; width: auto; font-size: 14px; border-radius: 8px; }
        .btn-deliver:hover { background: var(--secondary); }

        .empty-state { text-align: center; padding: 50px 20px; color: var(--gray); }
        .empty-state i { font-size: 50px; color: #cbd5e1; margin-bottom: 15px; }

        /* ================= Menu Manager View ================= */
        .menu-list-container { max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .menu-list-container::-webkit-scrollbar { width: 6px; }
        .menu-list-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .menu-item-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; border: 1px solid #eee; border-radius: 10px; margin-bottom: 10px; background: var(--white); transition: var(--transition); }
        .menu-item-row:hover { background: var(--bg); }
        .menu-item-info { display: flex; align-items: center; gap: 15px; }
        .menu-item-info img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; border: 1px solid #ddd; }
        .menu-item-details h4 { font-size: 16px; margin-bottom: 2px; }
        .menu-item-details span { font-size: 13px; color: var(--gray); }
        
        .menu-actions { display: flex; gap: 10px; }
        .btn-action { border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-family: 'Cairo', sans-serif; font-weight: bold; font-size: 13px; transition: var(--transition); color: white; }
        .btn-hide { background: var(--warning); }
        .btn-show { background: var(--success); }
        .btn-delete { background: var(--primary); }
        .btn-action:hover { opacity: 0.8; transform: translateY(-2px); }

        /* ================= Toast Notification ================= */
        #toast {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            background: var(--dark); color: white; padding: 15px 25px; border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: bottom 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 9999; display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 15px;
        }
        #toast.show { bottom: 30px; }
        #toast i { color: var(--success); font-size: 20px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-utensils"></i> البركة <span style="font-weight: 400; color:#bdc3c7;">| الإدارة</span>
        </div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <span style="font-size: 14px; color: #bdc3c7;"><i class="fa-solid fa-circle" style="color: var(--success); font-size: 10px; margin-left: 5px;"></i> متصل (Realtime)</span>
        </div>
    </header>

    <div class="dashboard-container">
        
        <div class="card">
            <div class="card-header">
                <i class="fa-solid fa-bell-concierge" style="color: #fff; background: var(--dark);"></i>
                <h2>طلبات العملاء <span id="ordersCount" style="background: var(--primary); color: white; padding: 2px 8px; border-radius: 20px; font-size: 14px; margin-right: 10px;">0</span></h2>
            </div>
            
            <div class="orders-container" id="orderGrid">
                <div class="empty-state">
                    <i class="fa-solid fa-spinner fa-spin"></i>
                    <p>جاري تحميل الطلبات...</p>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <i class="fa-solid fa-folder-plus"></i>
                <h2>إضافة وجبة للمنيو</h2>
            </div>
            
            <div class="form-group">
                <label>اسم الوجبة</label>
                <input type="text" id="title" class="form-control" placeholder="مثلاً: سندوتش شاورما دبل">
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label>السعر الأساسي (ج.م)</label>
                    <input type="number" id="price" class="form-control" placeholder="0">
                </div>
                <div class="form-group">
                    <label>القسم / التصنيف</label>
                    <select id="category" class="form-control">
                        <option value="سندوتشات">سندوتشات 🌯</option>
                        <option value="وجبات">وجبات 🍽️</option>
                        <option value="مقبلات">مقبلات 🍟</option>
                        <option value="مشروبات">مشروبات 🥤</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>صورة الوجبة</label>
                <input type="file" id="imageInput" class="form-control" accept="image/*" style="background: white;">
                <small style="color: var(--gray); font-size: 12px; margin-top: 5px; display: block;">* يُفضل أن يكون حجم الصورة أقل من 1 ميجابايت.</small>
            </div>

            <div class="offer-box">
                <label class="checkbox-label">
                    <input type="checkbox" id="isOffer"> إضافة عرض لفترة محدودة 🔥
                </label>
                <div id="offerFields" style="display:none; margin-top:15px;" class="form-grid">
                    <div class="form-group" style="margin: 0;">
                        <input type="number" id="offerPrice" class="form-control" placeholder="السعر بعد الخصم">
                    </div>
                    <div class="form-group" style="margin: 0;">
                        <input type="number" id="duration" class="form-control" placeholder="عدد ساعات العرض (مثال: 24)">
                    </div>
                </div>
            </div>

            <button class="btn btn-save" id="saveBtn" onclick="saveItem()">
                <i class="fa-solid fa-cloud-arrow-up"></i> حفظ ونشر الوجبة
            </button>
        </div>

        <div class="card full-width">
            <div class="card-header">
                <i class="fa-solid fa-list-check"></i>
                <h2>إدارة المنيو (التحكم في الوجبات)</h2>
            </div>
            <div class="menu-list-container" id="menuListGrid">
                <div class="empty-state">
                    <i class="fa-solid fa-spinner fa-spin"></i>
                    <p>جاري تحميل المنيو...</p>
                </div>
            </div>
        </div>

    </div>

    <div id="toast"><i class="fa-solid fa-circle-check"></i> <span id="toastMsg">تمت العملية بنجاح!</span></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyDLOsW830rHo7viYDAUehbTkfmBLAiGCg8",
            authDomain: "haaaaa-7e537.firebaseapp.com",
            databaseURL: "https://haaaaa-7e537-default-rtdb.firebaseio.com",
            projectId: "haaaaa-7e537",
            storageBucket: "haaaaa-7e537.firebasestorage.app",
            messagingSenderId: "874151449512",
            appId: "1:874151449512:web:32867d7d7e33170679839d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // نظام الإشعارات المنبثقة
        const showToast = (message, isError = false) => {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = message;
            toast.querySelector('i').className = isError ? "fa-solid fa-circle-exclamation" : "fa-solid fa-circle-check";
            toast.querySelector('i').style.color = isError ? "#e74c3c" : "#27ae60";
            
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3500);
        };

        // إظهار/إخفاء حقول العرض
        document.getElementById('isOffer').onchange = (e) => {
            document.getElementById('offerFields').style.display = e.target.checked ? 'grid' : 'none';
        };

        // ================= 1. إضافة وجبة جديدة =================
        window.saveItem = async () => {
            const title = document.getElementById('title').value.trim();
            const price = parseFloat(document.getElementById('price').value);
            const file = document.getElementById('imageInput').files[0];
            const btn = document.getElementById('saveBtn');

            if (!title || !price || !file) {
                showToast("برجاء إكمال البيانات الأساسية واختيار صورة!", true);
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري الرفع...';
            
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const isOffer = document.getElementById('isOffer').checked;
                const hours = parseInt(document.getElementById('duration').value) || 0;
                const offerPrice = parseFloat(document.getElementById('offerPrice').value) || 0;
                
                const expiry = new Date();
                expiry.setHours(expiry.getHours() + hours);

                try {
                    const menuRef = ref(db, 'menu');
                    const newItemRef = push(menuRef);

                    await set(newItemRef, {
                        title: title,
                        price: price,
                        category: document.getElementById('category').value,
                        image: reader.result,
                        isOffer: isOffer,
                        offerPrice: isOffer ? offerPrice : null,
                        offerExpiry: isOffer ? expiry.toISOString() : null,
                        available: true // الإتاحة الافتراضية
                    });

                    showToast("تمت إضافة الوجبة للمنيو بنجاح!");
                    
                    // تصفير الحقول
                    document.getElementById('title').value = '';
                    document.getElementById('price').value = '';
                    document.getElementById('imageInput').value = '';
                    document.getElementById('isOffer').checked = false;
                    document.getElementById('offerFields').style.display = 'none';

                } catch (error) {
                    showToast("حدث خطأ أثناء الحفظ: " + error.message, true);
                } finally {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> حفظ ونشر الوجبة';
                }
            };
        };

        // ================= 2. إدارة الطلبات =================
        const ordersRef = ref(db, 'orders');
        onValue(ordersRef, (snapshot) => {
            const grid = document.getElementById('orderGrid');
            const ordersData = snapshot.val();
            grid.innerHTML = '';
            
            if (!ordersData) {
                document.getElementById('ordersCount').innerText = "0";
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-mug-hot"></i>
                        <p>لا توجد طلبات جديدة حالياً.</p>
                    </div>`;
                return;
            }

            const keys = Object.keys(ordersData);
            document.getElementById('ordersCount').innerText = keys.length;

            keys.reverse().forEach(key => {
                const o = ordersData[key];
                const orderDate = new Date(o.timestamp);
                const timeString = orderDate.toLocaleTimeString('ar-EG', { hour: '2-digit', minute:'2-digit' });

                let itemsListHtml = '';
                if(o.items && Array.isArray(o.items)) {
                    o.items.forEach(item => {
                        itemsListHtml += `<li><span>${item.title}</span> <span class="en-text">${item.price} EGP</span></li>`;
                    });
                }

                grid.innerHTML += `
                    <div class="order-card">
                        <div class="order-header">
                            <div class="customer-info">
                                <h3><i class="fa-solid fa-user-astronaut" style="color:var(--gray)"></i> ${o.customerName}</h3>
                                <p><i class="fa-solid fa-phone"></i> ${o.customerPhone}</p>
                                <p><i class="fa-solid fa-location-dot"></i> ${o.customerAddress}</p>
                            </div>
                            <div class="order-time"><i class="fa-regular fa-clock"></i> ${timeString}</div>
                        </div>
                        
                        <div class="order-items"><ul>${itemsListHtml}</ul></div>
                        
                        <div class="order-footer">
                            <div class="order-total">الإجمالي: <span class="en-text">${o.totalPrice} EGP</span></div>
                            <button class="btn btn-deliver" onclick="markAsDelivered('${key}')">
                                <i class="fa-solid fa-check-double"></i> تم التوصيل
                            </button>
                        </div>
                    </div>
                `;
            });
        });

        window.markAsDelivered = async (orderId) => {
            if(confirm("هل متأكد من إنهاء الطلب وتسليمه؟")) {
                try {
                    await remove(ref(db, `orders/${orderId}`));
                    showToast("تم إغلاق الطلب!");
                } catch(error) { showToast("خطأ في حذف الطلب", true); }
            }
        };

        // ================= 3. إدارة المنيو (إخفاء/إظهار/حذف) =================
        const menuRef = ref(db, 'menu');
        onValue(menuRef, (snapshot) => {
            const listGrid = document.getElementById('menuListGrid');
            const data = snapshot.val();
            listGrid.innerHTML = '';

            if (!data) {
                listGrid.innerHTML = `<div class="empty-state"><i class="fa-solid fa-plate-wheat"></i><p>المنيو فارغ حالياً.</p></div>`;
                return;
            }

            Object.keys(data).forEach(key => {
                const item = data[key];
                const isAvailable = item.available !== false; // لو true أو مش موجودة معناها متاح

                listGrid.innerHTML += `
                    <div class="menu-item-row" style="opacity: ${isAvailable ? '1' : '0.6'};">
                        <div class="menu-item-info">
                            <img src="${item.image || 'https://via.placeholder.com/50'}" alt="">
                            <div class="menu-item-details">
                                <h4>${item.title}</h4>
                                <span class="en-text">${item.price} EGP | ${item.category}</span>
                            </div>
                        </div>
                        <div class="menu-actions">
                            <button class="btn-action ${isAvailable ? 'btn-hide' : 'btn-show'}" onclick="toggleVisibility('${key}', ${isAvailable})">
                                ${isAvailable ? '<i class="fa-solid fa-eye-slash"></i> إخفاء' : '<i class="fa-solid fa-eye"></i> إظهار'}
                            </button>
                            <button class="btn-action btn-delete" onclick="deleteMenuItem('${key}')">
                                <i class="fa-solid fa-trash-can"></i> حذف
                            </button>
                        </div>
                    </div>
                `;
            });
        });

        window.toggleVisibility = async (id, currentStatus) => {
            try {
                await update(ref(db, `menu/${id}`), { available: !currentStatus });
                showToast(currentStatus ? "تم إخفاء الوجبة مؤقتاً" : "تم إعادة إظهار الوجبة");
            } catch(e) { showToast("خطأ في التحديث", true); }
        };

        window.deleteMenuItem = async (id) => {
            if(confirm("هل أنت متأكد من حذف هذه الوجبة نهائياً من قاعدة البيانات؟ لا يمكن التراجع عن هذه الخطوة!")) {
                try {
                    await remove(ref(db, `menu/${id}`));
                    showToast("تم الحذف بنجاح!");
                } catch(e) { showToast("خطأ في الحذف", true); }
            }
        };

    </script>
</body>
</html>
